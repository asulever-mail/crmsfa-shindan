<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SFA/CRM活用診断｜営業体制チェック</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; background: #f7f7f5; color: #1a1a1a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
.card { background: #fff; border-radius: 16px; border: 0.5px solid #e0e0da; max-width: 600px; width: 100%; padding: 2rem 2.25rem; }
.logo { font-size: 13px; color: #888; margin-bottom: 2rem; letter-spacing: 0.04em; }
.progress-bar { height: 3px; background: #ebebeb; border-radius: 2px; margin-bottom: 2rem; }
.progress-fill { height: 3px; background: #1D9E75; border-radius: 2px; transition: width 0.4s ease; }
.step-label { font-size: 12px; color: #888; margin-bottom: 0.5rem; letter-spacing: 0.05em; }
.question { font-size: 19px; font-weight: 500; color: #1a1a1a; margin-bottom: 1.75rem; line-height: 1.55; }
.options { display: flex; flex-direction: column; gap: 10px; }
.opt-btn { background: #fff; border: 0.5px solid #d0d0cc; border-radius: 12px; padding: 14px 18px; font-size: 15px; color: #1a1a1a; cursor: pointer; text-align: left; transition: border-color 0.15s, background 0.15s; font-family: inherit; }
.opt-btn:hover { border-color: #1D9E75; background: #f4fdf9; }
.opt-btn.selected { border-color: #1D9E75; border-width: 1.5px; background: #e8f8f2; color: #085041; }
.nav { display: flex; justify-content: flex-end; margin-top: 1.5rem; }
.next-btn { background: #1D9E75; color: #fff; border: none; border-radius: 8px; padding: 12px 28px; font-size: 15px; font-weight: 500; cursor: pointer; opacity: 0.4; transition: opacity 0.2s; font-family: inherit; }
.next-btn.active { opacity: 1; }
.next-btn.active:hover { background: #0F6E56; }
.result-badge { display: inline-block; font-size: 12px; font-weight: 500; padding: 4px 14px; border-radius: 20px; margin-bottom: 1rem; }
.result-title { font-size: 21px; font-weight: 500; color: #1a1a1a; margin-bottom: 0.75rem; line-height: 1.45; }
.result-desc { font-size: 15px; color: #555; line-height: 1.75; margin-bottom: 1.5rem; }
.result-points { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.75rem; }
.point { display: flex; gap: 12px; align-items: flex-start; }
.point-icon { width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; margin-top: 2px; }
.point-text { font-size: 14px; color: #555; line-height: 1.65; }
.cta-area { background: #f7f7f5; border: 0.5px solid #e0e0da; border-radius: 12px; padding: 1.25rem 1.5rem; }
.cta-title { font-size: 15px; font-weight: 500; color: #1a1a1a; margin-bottom: 0.4rem; }
.cta-desc { font-size: 13px; color: #777; margin-bottom: 1rem; line-height: 1.65; }
.form-row { display: flex; flex-direction: column; gap: 8px; }
.form-input { width: 100%; padding: 10px 14px; border: 0.5px solid #d0d0cc; border-radius: 8px; font-size: 14px; background: #fff; color: #1a1a1a; font-family: inherit; outline: none; }
.form-input:focus { border-color: #1D9E75; }
.dl-btn { width: 100%; background: #1D9E75; color: #fff; border: none; border-radius: 8px; padding: 12px 20px; font-size: 15px; font-weight: 500; cursor: pointer; font-family: inherit; margin-top: 4px; }
.dl-btn:hover { background: #0F6E56; }
.dl-btn:disabled { opacity: 0.6; cursor: not-allowed; }
.error-msg { font-size: 12px; color: #A32D2D; display: none; }
.thankyou { text-align: center; padding: 3rem 0; }
.thankyou-icon { font-size: 40px; margin-bottom: 1.25rem; }
.thankyou h2 { font-size: 19px; font-weight: 500; margin-bottom: 0.75rem; color: #1a1a1a; }
.thankyou p { font-size: 14px; color: #777; line-height: 1.75; }
.hidden { display: none; }
@media (max-width: 480px) {
  .card { padding: 1.5rem 1.25rem; }
  .question { font-size: 17px; }
}
</style>
</head>
<body>
<div class="card">
  <div class="logo">ATHREBA｜営業体制診断</div>

  <div id="quiz-section">
    <div class="progress-bar"><div class="progress-fill" id="prog" style="width:14%"></div></div>
    <div class="step-label" id="step-label">質問 1 / 7</div>
    <div class="question" id="q-text"></div>
    <div class="options" id="options"></div>
    <div class="nav"><button class="next-btn" id="next-btn" onclick="nextQ()">次へ →</button></div>
  </div>

  <div id="result-section" class="hidden"></div>

  <div id="thankyou-section" class="thankyou hidden">
    <div class="thankyou-icon">✉️</div>
    <h2>ありがとうございます！</h2>
    <p>ご入力のメールアドレスに<br>AI商談コンテンツをお送りします。<br>しばらくお待ちください。</p>
  </div>
</div>

<script>
const questions = [
  { q: "SFA / CRMを導入して、どのくらい経ちますか？", opts: ["導入して1年未満", "1〜3年程度", "3年以上", "まだ導入していない"] },
  { q: "SFA / CRMの主な使い方は何ですか？", opts: ["データ入力・記録が中心", "レポート・分析に活用している", "自動化やワークフローを使っている", "正直あまり活用できていない"] },
  { q: "インサイドセールス（IS）の専任チームはありますか？", opts: ["専任チームがいる", "兼任で対応している", "これから立ち上げ予定", "IS機能はない"] },
  { q: "リードが入ったとき、誰がどう動くか決まっていますか？", opts: ["明確なルールがある", "なんとなく決まっている", "担当者任せになっている", "特に決まっていない"] },
  { q: "メルマガ・ナーチャリングコンテンツは定期的に配信できていますか？", opts: ["定期的に配信している", "不定期に配信している", "コンテンツが不足していて滞っている", "ほとんど配信できていない"] },
  { q: "営業のノウハウは属人化していると感じますか？", opts: ["かなり属人化している", "一部属人化している", "ある程度標準化できている", "しっかり標準化できている"] },
  { q: "今の体制で、受注率・成約率に課題を感じていますか？", opts: ["強く感じている", "少し感じている", "あまり感じていない", "課題は特にない"] }
];

const results = [
  {
    badge: "要・仕組み化",
    badgeStyle: "background:#FCEBEB;color:#A32D2D;",
    title: "ツールはあるが、運用が追いついていない状態です",
    desc: "SFA/CRMを導入していても、活用しきれていないケースは非常に多いです。今の状態では、リードが入っても受注につながりにくい構造になっている可能性があります。まずは「誰が何をするか」の設計から始めることが重要です。",
    points: [
      { text: "リードの振り分けルールが未整備", color: "#FCEBEB", textColor: "#A32D2D" },
      { text: "営業プロセスが属人化している", color: "#FCEBEB", textColor: "#A32D2D" },
      { text: "ツールの機能を活かしきれていない", color: "#FCEBEB", textColor: "#A32D2D" }
    ]
  },
  {
    badge: "部分最適フェーズ",
    badgeStyle: "background:#FAEEDA;color:#854F0B;",
    title: "一部は動いているが、連携に穴がある状態です",
    desc: "IS・マーケ・営業それぞれが動いていても、連携がうまく取れていないと受注率は上がりません。「リードを獲得したのに商談化しない」「商談したのに成約しない」という課題が発生しやすいフェーズです。",
    points: [
      { text: "IS〜営業のトスアップが機能しきれていない", color: "#FAEEDA", textColor: "#854F0B" },
      { text: "リードのナーチャリングが不十分", color: "#FAEEDA", textColor: "#854F0B" },
      { text: "データが蓄積されても活用されていない", color: "#FAEEDA", textColor: "#854F0B" }
    ]
  },
  {
    badge: "強化フェーズ",
    badgeStyle: "background:#EAF3DE;color:#3B6D11;",
    title: "体制はある。次は受注率の底上げです",
    desc: "基本的な仕組みはできています。このフェーズで差がつくのは「ナレッジの標準化」と「自動化による工数削減」です。営業ノウハウをSFA/CRMに落とし込むことで、チーム全体の受注率を引き上げられます。",
    points: [
      { text: "属人ノウハウのナレッジ化・標準化", color: "#EAF3DE", textColor: "#3B6D11" },
      { text: "リードスコアリングの精度向上", color: "#EAF3DE", textColor: "#3B6D11" },
      { text: "自動化で営業リソースを受注活動に集中", color: "#EAF3DE", textColor: "#3B6D11" }
    ]
  }
];

let current = 0, answers = [], savedResult = null;

function calcResult() {
  let score = 0;
  answers.forEach((a, i) => {
    if (i < 2) score += (a <= 1 ? 2 : a === 3 ? 0 : 1);
    else score += (a >= 2 ? 2 : a === 1 ? 1 : 0);
  });
  if (score <= 5) return results[0];
  if (score <= 10) return results[1];
  return results[2];
}

function render() {
  const q = questions[current];
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('step-label').textContent = `質問 ${current + 1} / ${questions.length}`;
  document.getElementById('prog').style.width = `${Math.round(((current + 1) / questions.length) * 100)}%`;
  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.opts.forEach((o, i) => {
    const b = document.createElement('button');
    b.className = 'opt-btn';
    b.textContent = o;
    if (answers[current] === i) b.classList.add('selected');
    b.onclick = () => {
      answers[current] = i;
      document.querySelectorAll('.opt-btn').forEach(x => x.classList.remove('selected'));
      b.classList.add('selected');
      document.getElementById('next-btn').classList.add('active');
    };
    opts.appendChild(b);
  });
  const nb = document.getElementById('next-btn');
  nb.classList.toggle('active', answers[current] !== undefined);
  nb.textContent = current === questions.length - 1 ? '結果を見る' : '次へ →';
}

function nextQ() {
  if (answers[current] === undefined) return;
  if (current < questions.length - 1) { current++; render(); }
  else { showResult(); }
}

function showResult() {
  document.getElementById('quiz-section').classList.add('hidden');
  savedResult = calcResult();
  const r = savedResult;
  const rs = document.getElementById('result-section');
  rs.classList.remove('hidden');
  rs.innerHTML = `
    <span class="result-badge" style="${r.badgeStyle}">${r.badge}</span>
    <div class="result-title">${r.title}</div>
    <div class="result-desc">${r.desc}</div>
    <div class="result-points">
      ${r.points.map(p => `<div class="point"><div class="point-icon" style="background:${p.color};color:${p.textColor};">✓</div><div class="point-text">${p.text}</div></div>`).join('')}
    </div>
    <div class="cta-area">
      <div class="cta-title">詳しい解決策をAI商談コンテンツでご確認いただけます</div>
      <div class="cta-desc">貴社の状況に合わせた営業体制の改善事例・ノウハウを5分でまとめた資料をお送りします。</div>
      <div class="form-row">
        <input class="form-input" type="text" id="input-company" placeholder="会社名">
        <input class="form-input" type="text" id="input-name" placeholder="お名前">
        <input class="form-input" type="tel" id="input-phone" placeholder="電話番号">
        <input class="form-input" type="email" id="input-email" placeholder="メールアドレス">
        <div class="error-msg" id="error-msg">すべての項目を正しく入力してください</div>
        <button class="dl-btn" id="submit-btn" onclick="submitToHubSpot()">資料を受け取る</button>
      </div>
    </div>
  `;
}

function submitToHubSpot() {
  const company = document.getElementById('input-company').value.trim();
  const name = document.getElementById('input-name').value.trim();
  const phone = document.getElementById('input-phone').value.trim();
  const email = document.getElementById('input-email').value.trim();
  const errorMsg = document.getElementById('error-msg');
  const btn = document.getElementById('submit-btn');

  if (!company || !name || !phone || !email || !email.includes('@')) {
    errorMsg.style.display = 'block';
    return;
  }
  errorMsg.style.display = 'none';
  btn.disabled = true;
  btn.textContent = '送信中...';

  const portalId = '24238570';
  const formGuid = '6964aea4-08de-4d21-965d-cb0224c40020';
  const url = `https://api.hsforms.com/submissions/v3/integration/submit/${portalId}/${formGuid}`;

  const payload = {
    fields: [
      { name: 'company', value: company },
      { name: 'firstname', value: name },
      { name: 'phone', value: phone },
      { name: 'email', value: email },
      { name: 'message', value: '診断結果：' + (savedResult ? savedResult.badge : '') }
    ],
    context: { pageUri: window.location.href, pageName: 'SFA/CRM活用診断' }
  };

  fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
  .then(res => {
    if (res.ok) {
      document.getElementById('result-section').classList.add('hidden');
      document.getElementById('thankyou-section').classList.remove('hidden');
    } else {
      btn.disabled = false;
      btn.textContent = '資料を受け取る';
      errorMsg.textContent = '送信に失敗しました。もう一度お試しください。';
      errorMsg.style.display = 'block';
    }
  })
  .catch(() => {
    btn.disabled = false;
    btn.textContent = '資料を受け取る';
    errorMsg.textContent = '通信エラーが発生しました。もう一度お試しください。';
    errorMsg.style.display = 'block';
  });
}

render();
</script>
</body>
</html>
